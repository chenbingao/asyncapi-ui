server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /docs/ {
    try_files $uri =404;
    add_header Cache-Control "no-store";
  }

  location = /config.json {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}
