server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /docs/ {
    try_files $uri =404;
    add_header Cache-Control "no-store";
  }

  location ~* ^/raw/(?<doc_path>.*)$ {
    alias /usr/share/nginx/html/docs/$doc_path;
    types {}
    default_type text/plain;
    charset utf-8;
    add_header Cache-Control "no-store";
  }

  location ~* ^/docs/.*\.(yaml|yml)$ {
    default_type text/yaml;
    charset utf-8;
    try_files $uri =404;
    add_header Cache-Control "no-store";
  }

  location = /config.json {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}
